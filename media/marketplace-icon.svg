<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 28 192 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="chassis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8c8cc"/>
      <stop offset="0.5" stop-color="#9a9a9e"/>
      <stop offset="1" stop-color="#6a6a6e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ff3344" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff3344" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- Outer chassis (rounded, with notches like the real device) -->
  <path d="M 28 36
           L 180 36
           Q 192 36 192 48
           L 192 208
           Q 192 220 180 220
           L 28 220
           Q 16 220 16 208
           L 16 48
           Q 16 36 28 36 Z"
        fill="url(#chassis)" stroke="#3a3a3e" stroke-width="2"/>

  <!-- Inner panel (darker recessed area) -->
  <rect x="32" y="52" width="144" height="152" rx="6" fill="#52525a"/>

  <!-- Hex bolts at corners -->
  <g fill="#4a4a4e" stroke="#1a1a1a" stroke-width="1">
    <circle cx="32" cy="52" r="5"/>
    <circle cx="176" cy="52" r="5"/>
    <circle cx="32" cy="204" r="5"/>
    <circle cx="176" cy="204" r="5"/>
  </g>

  <!-- Display bezel -->
  <rect x="48" y="64" width="120" height="56" rx="3" fill="#1a1a1c" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Display itself -->
  <rect x="52" y="68" width="112" height="48" rx="1" fill="url(#screen)"/>
  <!-- Red display glow -->
  <rect x="52" y="68" width="112" height="48" rx="1" fill="url(#screenGlow)"/>
  <!-- Pixel-art "CYBER" style text on screen -->
  <g fill="#ff5566">
    <!-- C -->
    <rect x="60" y="80" width="3" height="3"/><rect x="63" y="80" width="3" height="3"/><rect x="66" y="80" width="3" height="3"/>
    <rect x="60" y="83" width="3" height="3"/>
    <rect x="60" y="86" width="3" height="3"/>
    <rect x="60" y="89" width="3" height="3"/><rect x="63" y="89" width="3" height="3"/><rect x="66" y="89" width="3" height="3"/>
    <!-- F -->
    <rect x="74" y="80" width="3" height="3"/><rect x="77" y="80" width="3" height="3"/><rect x="80" y="80" width="3" height="3"/>
    <rect x="74" y="83" width="3" height="3"/>
    <rect x="74" y="86" width="3" height="3"/><rect x="77" y="86" width="3" height="3"/>
    <rect x="74" y="89" width="3" height="3"/>
    <!-- Bottom row decorative pixels -->
    <rect x="60" y="100" width="3" height="3"/><rect x="66" y="100" width="3" height="3"/><rect x="72" y="100" width="3" height="3"/><rect x="78" y="100" width="3" height="3"/>
    <rect x="63" y="103" width="3" height="3"/><rect x="69" y="103" width="3" height="3"/><rect x="75" y="103" width="3" height="3"/>
  </g>

  <!-- Slider (left side) -->
  <rect x="40" y="132" width="20" height="60" rx="2" fill="#1a1a1c"/>
  <rect x="44" y="148" width="12" height="14" rx="1" fill="#888"/>

  <!-- Six buttons in 2x3 grid (matching real device colors) -->
  <!-- Row 1 -->
  <g>
    <rect x="76" y="130" width="32" height="22" rx="3" fill="#3a3a3e" stroke="#cc3333" stroke-width="2"/>
    <polygon points="88,146 96,146 92,138" fill="#cc3333"/>
  </g>
  <g>
    <rect x="116" y="130" width="32" height="22" rx="3" fill="#3a3a3e" stroke="#3355cc" stroke-width="2"/>
    <polygon points="128,138 136,138 132,146" fill="#3355cc"/>
  </g>
  <!-- Row 2 -->
  <g>
    <rect x="76" y="158" width="32" height="22" rx="3" fill="#3a3a3e" stroke="#cccc33" stroke-width="2"/>
    <polygon points="92,162 84,170 92,178" fill="#cccc33"/>
  </g>
  <g>
    <rect x="116" y="158" width="32" height="22" rx="3" fill="#3a3a3e" stroke="#33cc55" stroke-width="2"/>
    <polygon points="132,162 140,170 132,178" fill="#33cc55"/>
  </g>
  <!-- Row 3 -->
  <g>
    <rect x="76" y="186" width="32" height="14" rx="3" fill="#3a3a3e" stroke="#aa4422" stroke-width="2"/>
    <rect x="89" y="190" width="6" height="6" fill="#aa4422"/>
  </g>
  <g>
    <rect x="116" y="186" width="32" height="14" rx="3" fill="#3a3a3e" stroke="#888" stroke-width="2"/>
    <circle cx="132" cy="193" r="3" fill="#888"/>
  </g>
</svg>
